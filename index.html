<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raw Denim Norway — Kundeservice</title>
<link rel="icon" type="image/png" href="/assets/raw_fav_icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#111;--yellow:#F5E000;--white:#fff;
  --off:#F7F6F2;--g2:#D5D3CD;--g4:#9B9890;--g6:#5A5855;
  --cond:"Barlow Condensed",sans-serif;
  --body:"Barlow",sans-serif;
  --mono:"IBM Plex Mono",monospace;
}
body{font-family:var(--body);background:var(--off);color:var(--black);height:100vh;display:flex;flex-direction:column;font-size:15px;}

header{background:var(--white);border-bottom:1px solid #e8e8e8;padding:0 40px;height:80px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.logo{height:52px;width:auto;object-fit:contain;}
.ai-pill{position:absolute;right:40px;background:var(--black);color:var(--yellow);font-family:var(--mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;padding:5px 12px;display:flex;align-items:center;gap:6px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#6abf40;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

nav{background:var(--white);border-bottom:1px solid #e8e8e8;padding:0 40px;height:38px;display:flex;align-items:center;justify-content:center;gap:36px;flex-shrink:0;}
.nav-item{font-family:var(--cond);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#999;text-decoration:none;transition:color .12s;}
.nav-item:hover,.nav-item.active{color:var(--black);}

.status-bar{background:var(--black);color:#888;font-family:var(--mono);font-size:10px;padding:5px 40px;text-align:center;letter-spacing:.08em;flex-shrink:0;display:none;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.welcome-view{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
.welcome-inner{text-align:center;max-width:600px;width:100%;}
.welcome-eyebrow{font-family:var(--cond);font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:#bbb;margin-bottom:14px;}
.welcome-inner h1{font-family:var(--cond);font-weight:900;font-size:52px;text-transform:uppercase;letter-spacing:0.04em;color:var(--black);line-height:.92;margin-bottom:14px;}
.welcome-inner p{font-size:14px;color:var(--g6);line-height:1.6;margin-bottom:28px;}
.welcome-input-row{display:flex;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.welcome-input-row textarea{flex:1;border:1.5px solid var(--black);border-right:none;padding:13px 16px;font-family:var(--body);font-size:14px;background:var(--white);color:var(--black);outline:none;resize:none;line-height:1.5;height:52px;}
.welcome-input-row textarea::placeholder{color:var(--g4);}
.welcome-input-row button{background:var(--yellow);border:1.5px solid var(--black);border-left:none;padding:0 24px;font-family:var(--cond);font-weight:900;font-size:12px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;color:var(--black);transition:all .12s;white-space:nowrap;}
.welcome-input-row button:hover{background:var(--black);color:var(--yellow);}
.welcome-input-row button:disabled{opacity:.4;cursor:not-allowed;}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.chip{background:var(--white);border:1px solid var(--g2);padding:7px 14px;font-size:12px;color:var(--g6);cursor:pointer;transition:all .12s;font-family:var(--body);}
.chip:hover{border-color:var(--black);background:var(--yellow);color:var(--black);}

.chat-view{flex:1;display:none;flex-direction:column;overflow:hidden;}
.chat-area{flex:1;overflow-y:auto;padding:24px 40px;display:flex;flex-direction:column;gap:16px;}
.msg{display:flex;gap:12px;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.msg.user{flex-direction:row-reverse;}
.avatar{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--cond);font-weight:700;font-size:10px;letter-spacing:.05em;}
.avatar.bot{background:var(--black);color:var(--yellow);}
.avatar.user{background:var(--yellow);color:var(--black);}
.bubble{background:var(--white);border:1px solid #e5e5e5;padding:12px 16px;font-size:14px;line-height:1.65;max-width:580px;color:var(--black);}
.msg.user .bubble{background:var(--black);color:var(--white);border-color:var(--black);}
.bubble p{margin-bottom:8px;}.bubble p:last-child{margin-bottom:0;}.bubble strong{font-weight:600;}
.typing-dots{display:flex;gap:4px;padding:4px 0;align-items:center;}
.typing-dots span{width:7px;height:7px;background:var(--g4);border-radius:50%;animation:bounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

.chat-input-bar{border-top:1px solid #e5e5e5;padding:14px 40px;display:flex;flex-shrink:0;background:var(--white);}
.chat-input-bar textarea{flex:1;border:1.5px solid var(--black);border-right:none;padding:11px 16px;font-family:var(--body);font-size:14px;background:var(--off);color:var(--black);outline:none;resize:none;line-height:1.5;height:46px;max-height:120px;}
.chat-input-bar textarea::placeholder{color:var(--g4);}
.chat-input-bar button{background:var(--yellow);border:1.5px solid var(--black);border-left:none;padding:0 22px;font-family:var(--cond);font-weight:900;font-size:12px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;color:var(--black);transition:all .12s;white-space:nowrap;}
.chat-input-bar button:hover{background:var(--black);color:var(--yellow);}
.chat-input-bar button:disabled{opacity:.4;cursor:not-allowed;}
.error-bar{background:#FCEBEB;color:#A32D2D;border-left:3px solid #A32D2D;font-family:var(--mono);font-size:12px;padding:8px 40px;display:none;flex-shrink:0;}

footer{background:var(--black);padding:14px 40px;display:flex;align-items:center;gap:20px;flex-shrink:0;flex-wrap:wrap;}
.footer-info{display:flex;flex-direction:column;gap:3px;}
.footer-line{font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:#555;}
.footer-line a{color:#555;text-decoration:none;}.footer-line a:hover{color:var(--yellow);}
.footer-social{margin-left:auto;display:flex;align-items:center;gap:16px;}
.social-link{color:#555;text-decoration:none;transition:color .12s;display:flex;align-items:center;gap:6px;}
.social-link:hover{color:var(--yellow);}
.social-link svg{width:15px;height:15px;fill:currentColor;}
.social-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;}
</style>
</head>
